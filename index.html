<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Calculator</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
    input, button { margin: 5px; padding: 8px 12px; }
    p { font-weight: bold; }
  </style>
</head>
<body>
  <h2>Minimal Calculator</h2>
  
  <!-- Input fields -->
  <input type="number" id="num1" placeholder="Enter Num1">
  <input type="number" id="num2" placeholder="Enter Num2"><br>
  
  <!-- Buttons for operations -->
  <button id="btnAdd">Add</button>
  <button id="btnSub">Subtract</button>
  <button id="btnMult">Multiply</button>
  <button id="btnDiv">Divide</button>
  
  <!-- Result paragraphs -->
  <p id="paraadd"></p>
  <p id="parasub"></p>
  <p id="paramult"></p>
  <p id="paradiv"></p>
  
  <script>
    function getValues() {
      return [
        parseFloat(document.getElementById("num1").value) || 0,
        parseFloat(document.getElementById("num2").value) || 0
      ];
    }

    document.getElementById("btnAdd").addEventListener("click", function() {
      let [a, b] = getValues();
      document.getElementById("paraadd").innerHTML = "Sum: " + (a + b);
    });

    document.getElementById("btnSub").addEventListener("click", function() {
      let [a, b] = getValues();
      document.getElementById("parasub").innerHTML = "Difference: " + (a - b);
    });

    document.getElementById("btnMult").addEventListener("click", function() {
      let [a, b] = getValues();
      document.getElementById("paramult").innerHTML = "Multiplication: " + (a * b);
    });

    document.getElementById("btnDiv").addEventListener("click", function() {
      let [a, b] = getValues();
      document.getElementById("paradiv").innerHTML = b !== 0 
        ? "Division: " + (a / b) 
        : "Division: Cannot divide by zero";
    });
  </script>
</body>
</html>
